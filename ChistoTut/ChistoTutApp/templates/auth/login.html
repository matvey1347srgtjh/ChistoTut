<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — Чисто.Тут</title>
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'dashboard:main' %}">Главная</a>
            | Вход
            | <a href="{% url 'auth:register' %}">Регистрация</a>
        </nav>
    </header>

    <h1>Вход в систему</h1>
    <p>Чисто.Тут — учёт заказов химчистки</p>

    {% if form.errors %}
    <p>Неверный логин или пароль. Попробуйте снова.</p>
    {% endif %}

    <form method="post" action="{% url 'auth:login' %}">
        {% csrf_token %}
        <table>
            <tr>
                <td>{{ form.username.label_tag }}</td>
                <td>{{ form.username }}</td>
            </tr>
            <tr>
                <td>{{ form.password.label_tag }}</td>
                <td>{{ form.password }}</td>
            </tr>
        </table>
        <input type="submit" value="Войти">
        <input type="hidden" name="next" value="{{ next }}">
    </form>

</body>
</html>
